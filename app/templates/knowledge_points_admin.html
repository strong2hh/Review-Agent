<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后台录入知识点</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=ZCOOL+XiaoWei&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-main: #f8f6ef;
        --bg-panel: rgba(255, 255, 255, 0.92);
        --line: #dcd5c9;
        --line-soft: #ece6dc;
        --ink-main: #1d2834;
        --ink-soft: #4f6170;
        --brand: #0d6b63;
        --brand-2: #1557a5;
        --danger: #b3372f;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink-main);
        background: radial-gradient(circle at 9% 12%, #f0dbc8, transparent 34%),
          radial-gradient(circle at 88% 10%, #d2e8e2, transparent 30%),
          linear-gradient(160deg, #f7f5ee, #f4f7f4 54%, #edf4f5);
      }
      .wrap {
        width: min(1180px, 94vw);
        margin: 24px auto 36px;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }
      .header h1 {
        margin: 0;
        font-family: "ZCOOL XiaoWei", "Songti SC", serif;
        font-size: clamp(28px, 4vw, 42px);
        letter-spacing: 0.02em;
      }
      .link {
        text-decoration: none;
        font-weight: 700;
        color: #0e4d76;
      }
      .lead {
        margin: 0 0 16px;
        color: var(--ink-soft);
      }
      .grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 14px;
      }
      .panel {
        border: 1px solid var(--line);
        background: var(--bg-panel);
        border-radius: 22px;
        padding: 18px;
        box-shadow: 0 18px 54px rgba(24, 39, 56, 0.14);
      }
      h2 {
        margin: 0 0 8px;
        font-size: 23px;
        font-family: "ZCOOL XiaoWei", "Songti SC", serif;
      }
      .muted {
        color: var(--ink-soft);
        font-size: 14px;
        margin-top: 0;
        line-height: 1.7;
      }
      label {
        display: block;
        margin: 10px 0 6px;
        color: #324252;
        font-size: 14px;
        font-weight: 600;
      }
      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid #ccd6df;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 14px;
        font-family: inherit;
        background: #fff;
        color: var(--ink-main);
      }
      textarea {
        min-height: 130px;
        resize: vertical;
        line-height: 1.6;
      }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #6f9eb9;
        box-shadow: 0 0 0 3px rgba(21, 87, 165, 0.14);
      }
      .btn-row {
        margin-top: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        color: #fff;
        cursor: pointer;
        font-weight: 700;
      }
      button.primary {
        background: var(--brand);
      }
      button.secondary {
        background: var(--brand-2);
      }
      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .feedback {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 14px;
        display: none;
      }
      .feedback.ok {
        display: block;
        background: #eaf9f3;
        color: #16664e;
        border: 1px solid #bce7d5;
      }
      .feedback.error {
        display: block;
        background: #fdf0ee;
        color: #8b2c25;
        border: 1px solid #f3c8c3;
      }
      .list {
        margin-top: 8px;
        max-height: 560px;
        overflow: auto;
        padding-right: 2px;
      }
      .item {
        border: 1px solid var(--line-soft);
        border-left: 4px solid #89aeb9;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 10px;
        background: #fff;
      }
      .item h3 {
        margin: 0 0 6px;
        font-size: 17px;
      }
      .item p {
        margin: 0;
        white-space: pre-wrap;
        color: #304151;
        font-size: 14px;
        line-height: 1.65;
      }
      .meta {
        margin-top: 6px;
        color: #66798a;
        font-size: 12px;
      }
      .item-actions {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .action-btn {
        border: 0;
        border-radius: 999px;
        padding: 7px 12px;
        color: #fff;
        font-size: 13px;
        cursor: pointer;
      }
      .action-edit {
        background: var(--brand-2);
      }
      .action-delete {
        background: var(--danger);
      }
      @media (max-width: 960px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <h1>后台录入知识点</h1>
        <div>
          <a class="link" href="/admin/model-settings" style="margin-right: 10px">模型配置</a>
          <a class="link" href="/">返回首页</a>
        </div>
      </div>
      <p class="lead">在这里管理题库：单条录入、批量导入、在线编辑与删除。</p>

      <div class="grid">
        <div class="panel">
          <h2>单条录入</h2>
          <p class="muted">填写标题、内容和标签，提交后会立即进入复习队列。</p>
          <form id="create-form">
            <label for="title">标题</label>
            <input id="title" type="text" placeholder="例如：TCP 三次握手" required />

            <label for="content">内容</label>
            <textarea id="content" placeholder="例如：SYN -> SYN-ACK -> ACK" required></textarea>

            <label for="tags">标签（逗号分隔）</label>
            <input id="tags" type="text" placeholder="network, tcp" />

            <div class="btn-row">
              <button id="create-btn" class="primary" type="submit">保存知识点</button>
              <button id="cancel-edit-btn" class="secondary" type="button" style="display: none">取消编辑</button>
            </div>
          </form>
          <div id="create-feedback" class="feedback"></div>
        </div>

        <div class="panel">
          <h2>批量导入</h2>
          <p class="muted">支持 `csv`（每行: 标题,内容）或 `markdown`（`## 标题` + 正文）。</p>
          <form id="import-form">
            <label for="import-format">导入格式</label>
            <select id="import-format">
              <option value="csv">csv</option>
              <option value="markdown">markdown</option>
            </select>

            <label for="import-file">上传文件（.csv / .md）</label>
            <input id="import-file" type="file" accept=".csv,.md,.markdown,text/csv,text/markdown,text/plain" />

            <label for="import-payload">导入内容</label>
            <textarea id="import-payload" placeholder="TCP 三次握手,SYN SYN-ACK ACK"></textarea>

            <div class="btn-row">
              <button id="import-btn" class="secondary" type="submit">执行导入</button>
            </div>
          </form>
          <div id="import-feedback" class="feedback"></div>
        </div>
      </div>

      <div class="panel" style="margin-top: 16px">
        <h2>最近录入知识点</h2>
        <p class="muted">默认展示最新 50 条，可在列表中直接编辑或删除。</p>
        <div id="list" class="list"></div>
      </div>
    </div>
    <script src="/static/knowledge_points_admin.js"></script>
  </body>
</html>
