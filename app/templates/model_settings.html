<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模型配置</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=ZCOOL+XiaoWei&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-main: #f8f6ef;
        --bg-panel: rgba(255, 255, 255, 0.92);
        --line: #dcd5c9;
        --ink-main: #1d2834;
        --ink-soft: #4f6170;
        --brand: #0d6b63;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink-main);
        background: radial-gradient(circle at 9% 12%, #f0dbc8, transparent 34%),
          radial-gradient(circle at 88% 10%, #d2e8e2, transparent 30%),
          linear-gradient(160deg, #f7f5ee, #f4f7f4 54%, #edf4f5);
      }
      .wrap {
        width: min(920px, 94vw);
        margin: 24px auto 36px;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }
      .header h1 {
        margin: 0;
        font-family: "ZCOOL XiaoWei", "Songti SC", serif;
        font-size: clamp(28px, 4vw, 42px);
      }
      .link {
        text-decoration: none;
        font-weight: 700;
        color: #0e4d76;
      }
      .panel {
        border: 1px solid var(--line);
        background: var(--bg-panel);
        border-radius: 22px;
        padding: 18px;
        box-shadow: 0 18px 54px rgba(24, 39, 56, 0.14);
      }
      .muted {
        color: var(--ink-soft);
        font-size: 14px;
        margin-top: 0;
        line-height: 1.7;
      }
      .mini-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      label {
        display: block;
        margin: 10px 0 6px;
        color: #324252;
        font-size: 14px;
        font-weight: 600;
      }
      input,
      select {
        width: 100%;
        border: 1px solid #ccd6df;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 14px;
        font-family: inherit;
        background: #fff;
        color: var(--ink-main);
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #6f9eb9;
        box-shadow: 0 0 0 3px rgba(21, 87, 165, 0.14);
      }
      .btn-row {
        margin-top: 12px;
        display: flex;
        gap: 8px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        color: #fff;
        cursor: pointer;
        font-weight: 700;
        background: var(--brand);
      }
      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .hint {
        margin-top: 8px;
        color: #5b6c7a;
        font-size: 13px;
      }
      .feedback {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 14px;
        display: none;
      }
      .feedback.ok {
        display: block;
        background: #eaf9f3;
        color: #16664e;
        border: 1px solid #bce7d5;
      }
      .feedback.error {
        display: block;
        background: #fdf0ee;
        color: #8b2c25;
        border: 1px solid #f3c8c3;
      }
      @media (max-width: 960px) {
        .mini-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <h1>模型配置</h1>
        <div>
          <a class="link" href="/admin/knowledge-points" style="margin-right: 10px">知识点后台</a>
          <a class="link" href="/">返回首页</a>
        </div>
      </div>

      <div class="panel">
        <p class="muted">分别设置出题模型和评分模型。保存后，新开启的复习会话会使用最新配置。</p>
        <form id="model-form">
          <div class="mini-grid">
            <div>
              <label for="question-provider">出题 Provider</label>
              <select id="question-provider" required></select>
            </div>
            <div>
              <label for="question-model">出题 Model</label>
              <input id="question-model" type="text" placeholder="例如：deepseek-chat" required />
            </div>
            <div>
              <label for="grading-provider">评分 Provider</label>
              <select id="grading-provider" required></select>
            </div>
            <div>
              <label for="grading-model">评分 Model</label>
              <input id="grading-model" type="text" placeholder="例如：deepseek-chat" required />
            </div>
          </div>
          <div class="btn-row">
            <button id="save-model-btn" type="submit">保存模型配置</button>
          </div>
        </form>
        <p class="hint">如使用非 mock Provider，请先在环境变量中配置对应 API Key。</p>
        <div id="model-feedback" class="feedback"></div>
      </div>
    </div>
    <script src="/static/model_settings.js"></script>
  </body>
</html>
